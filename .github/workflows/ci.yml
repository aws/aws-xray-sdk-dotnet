name: Continuous Build
permissions:
    contents: read

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

jobs:
    build-test:
        runs-on: windows-latest

        env:
            DOTNET_MULTILEVEL_LOOKUP: 1

        strategy:
            fail-fast: false
            matrix:
                version: [net452, net462, netcoreapp2.0, netcoreapp3.1, net6.0]

        steps:
        - name: Checkout repository
          uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 #v2.7.0

        - uses: actions/setup-dotnet@871f041373faaad213a635d9afb62905ec029bbb #v1.10.1
          with:
            dotnet-version: '2.0.x'

        - uses: actions/setup-dotnet@871f041373faaad213a635d9afb62905ec029bbb #v1.10.1
          with:
            dotnet-version: '3.1.x'

        - uses: actions/setup-dotnet@871f041373faaad213a635d9afb62905ec029bbb #v1.10.1
          with:
            dotnet-version: '6.0.x'

        - name: Install dependencies
          run: dotnet restore sdk/AWSXRayRecorder.sln

        - name: Build solution
          run: dotnet build sdk/AWSXRayRecorder.sln --configuration Release --no-restore

        - name: Run tests
          run: >-
            dotnet test sdk/test/UnitTests/bin/Release/${{matrix.version}}/AWSXRayRecorder.UnitTests.dll
            --configuration Release
            --no-build
            --logger "console;verbosity=detailed"

    static-code-checks:
        runs-on: ubuntu-latest
        steps:

        - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #5.0.0
          with:
            fetch-depth: 0
        - name: Check for versioned GitHub actions
          if: always()
          run: |
            # Get changed GitHub workflow/action files
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E "^\.github/(workflows|actions)/.*\.ya?ml$" || true)
            
            if [ -n "$CHANGED_FILES" ]; then
              # Check for any versioned actions, excluding comments and this validation script
              VIOLATIONS=$(grep -Hn "uses:.*@v" $CHANGED_FILES | grep -v "grep.*uses:.*@v" | grep -v "#.*@v" || true)
              if [ -n "$VIOLATIONS" ]; then
                echo "Found versioned GitHub actions. Use commit SHAs instead:"
                echo "$VIOLATIONS"
                exit 1
              fi
            fi
            
            echo "No versioned actions found in changed files"